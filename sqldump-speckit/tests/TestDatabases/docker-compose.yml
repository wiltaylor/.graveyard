version: '3.8'

services:
  mssql-2019:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: speckit-test-mssql-2019
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - mssql2019-data:/var/opt/mssql
      - ./Northwind:/setup/Northwind:ro
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  mssql-2022:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: speckit-test-mssql-2022
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1435:1433"
    volumes:
      - mssql2022-data:/var/opt/mssql
      - ./Northwind:/setup/Northwind:ro
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  mssql2019-data:
  mssql2022-data:
